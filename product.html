<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عبق</title>
  <link rel="stylesheet" href="style.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QHGE8WC911"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QHGE8WC911');
  </script>
  <style>
    .product-page {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 24px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .product-gallery {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gallery-main {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: #eee;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .2s;
    }

    .gallery-thumbs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .gallery-thumb {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s;
    }

    .gallery-thumb.active { border-color: var(--accent); }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-detail {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .back-link {
      font-size: .9rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .back-link:hover { color: var(--accent); }

    .product-detail h1 {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .product-detail .product-price {
      font-size: 1.5rem;
    }

    .product-detail .product-desc {
      font-size: .95rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .product-detail .product-qty-row {
      margin-top: 4px;
    }

    .product-detail .add-to-cart {
      margin-top: 4px;
      padding: 14px;
      font-size: 1rem;
    }

    .variant-toggle {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .variant-option {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 18px;
      border: 2px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      flex: 1;
      min-width: 130px;
      transition: border-color .2s, background .2s;
    }
    .variant-option.selected {
      border-color: var(--accent);
      background: #fff0f3;
    }
    .variant-option input { display: none; }
    .variant-label { font-weight: 700; font-size: .95rem; color: var(--text); }
    .variant-price { font-size: 1.1rem; font-weight: 800; color: var(--accent); }

    .package-contents {
      background: var(--light);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .contents-title {
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 10px;
      color: var(--brand);
    }
    .contents-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .contents-list li {
      font-size: .9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .not-found {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .product-page {
        grid-template-columns: 1fr;
        gap: 24px;
        margin: 24px auto;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a class="logo" href="index.html"><img src="images/logo.jpeg" alt="Abaq" style="height:48px;width:48px;object-fit:cover;border-radius:50%;" /></a>
      <nav>
        <a href="index.html" data-i18n="nav.shop">المتجر</a>
        <a href="about.html" data-i18n="nav.about">من نحن</a>
      </nav>
      <button id="langToggleBtn" class="lang-btn">EN</button>
      <button class="cart-btn" id="cartBtn">
        <span data-i18n="nav.cart">سلتي</span> <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <div id="pageContent"></div>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3 data-i18n="cart.title">سلة التسوق</h3>
      <button class="close-btn" id="closeCart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total"><span data-i18n="cart.subtotal">المجموع الجزئي:</span> <strong id="cartSubtotal">₪0.00</strong></div>
      <div class="cart-total"><span data-i18n="cart.shipping">الشحن:</span> <strong id="cartShipping" style="font-size:.85rem;color:#888;">يُحسب حسب المدينة</strong></div>
      <div class="cart-total" style="font-size:1.15rem;border-top:1px solid #eee;padding-top:12px;margin-top:4px;"><span data-i18n="cart.total">الإجمالي:</span> <strong id="cartTotal">₪0.00</strong></div>
      <button class="btn-primary checkout-btn" id="checkoutBtn" data-i18n="cart.checkout">إتمام الطلب</button>
    </div>
  </aside>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ORDER FORM MODAL -->
  <div class="payment-overlay" id="orderOverlay"></div>
  <div class="payment-modal" id="orderModal">
    <div class="payment-modal-header">
      <h3 data-i18n="order.title">تأكيد الطلب</h3>
      <button class="close-btn" id="closeOrder">&times;</button>
    </div>
    <div class="payment-modal-body">
      <div class="payment-total-line"><span data-i18n="order.total">المجموع:</span> <strong id="orderTotalDisplay">₪0.00</strong></div>
      <form id="orderForm">
        <div class="order-field">
          <label data-i18n="order.name">الاسم الكامل</label>
          <input type="text" id="customerName" data-i18n-ph="order.namePH" placeholder="ادخل اسمك" required />
        </div>
        <div class="order-field">
          <label data-i18n="order.phone">رقم الهاتف</label>
          <input type="tel" id="customerPhone" data-i18n-ph="order.phonePH" placeholder="05XXXXXXXX" required />
        </div>
        <!-- Delivery method -->
        <div class="order-field">
          <label data-i18n="order.deliveryLabel">طريقة الاستلام</label>
          <div class="delivery-toggle">
            <label class="delivery-option">
              <input type="radio" name="deliveryMethod" value="delivery" id="methodDelivery" checked />
              <span data-i18n="order.delivery">🚚 توصيل للمنزل</span>
            </label>
            <label class="delivery-option">
              <input type="radio" name="deliveryMethod" value="pickup" id="methodPickup" />
              <span data-i18n="order.pickup">🤝 استلام من الناصرة</span>
            </label>
          </div>
        </div>
        <!-- City (delivery only) -->
        <div class="order-field" id="cityField">
          <label data-i18n="order.city">المدينة</label>
          <select id="customerCity">
            <option value="">اختاري مدينتك...</option>
          </select>
          <div id="shippingEstimate" class="shipping-estimate"></div>
        </div>
        <!-- Street (delivery only) -->
        <div class="order-field" id="streetField">
          <label data-i18n="order.street">الشارع والعنوان التفصيلي</label>
          <input type="text" id="customerAddress" data-i18n-ph="order.streetPH" placeholder="الشارع، رقم البيت" />
        </div>
        <!-- Pickup info -->
        <div class="pickup-info" id="pickupInfo" style="display:none;">
          <span data-i18n="order.pickupInfo">📍 سيتم التواصل معك لتحديد موعد الاستلام من الناصرة.</span>
        </div>
        <div class="order-field">
          <label data-i18n="order.notes">ملاحظات (اختياري)</label>
          <textarea id="customerNotes" data-i18n-ph="order.notesPH" placeholder="أي تفاصيل إضافية..." rows="2"></textarea>
        </div>
        <button class="btn-primary pay-btn" type="submit" data-i18n="order.submit">إرسال الطلب عبر واتساب</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="products-data.js"></script>
  <script src="shipping-data.js"></script>
  <script src="translations.js"></script>
  <script src="i18n.js"></script>
  <script>
    // ── STOCK ─────────────────────────────────────────────
    let stockCache = {};

    async function loadStock() {
      const { data, error } = await _supabase.from("stock").select("product_id, qty");
      if (error) { products.forEach((p) => { stockCache[p.id] = p.stock ?? 0; }); return; }
      data.forEach((row) => { stockCache[row.product_id] = row.qty; });
      products.forEach((p) => { if (stockCache[p.id] === undefined) stockCache[p.id] = p.stock ?? 0; });
    }

    function getStock(id) { return stockCache[id] ?? 0; }

    async function deductStock(id, qty) {
      const newQty = Math.max(0, getStock(id) - qty);
      stockCache[id] = newQty;
      await _supabase.from("stock").update({ qty: newQty }).eq("product_id", id);
    }

    // ── CART ─────────────────────────────────────────────
    let cart = JSON.parse(localStorage.getItem("abaq_cart") || "[]");

    function saveCart() { localStorage.setItem("abaq_cart", JSON.stringify(cart)); }

    function addToCart(id, qty = 1) {
      const product = products.find((p) => p.id === id);
      const existing = cart.find((i) => i.id === id);
      const currentInCart = existing ? existing.qty : 0;
      const available = getStock(id);
      if (available === 0) {
        showToast(I18N.t("product.outOfStock"));
        return;
      }
      if (currentInCart + qty > available) {
        showToast(I18N.getLang() === 'en' ? `Only ${available} in stock!` : `الكمية المتوفرة ${available} فقط!`);
        return;
      }
      if (existing) { existing.qty += qty; } else { cart.push({ ...product, qty }); }
      saveCart();
      updateCartUI();
      const displayName = I18N.getLang() === 'en' ? (product.nameEn || product.name) : product.name;
      showToast(I18N.t("toast.added", { name: displayName }));
    }

    function removeFromCart(id) {
      cart = cart.filter((i) => String(i.id) !== String(id));
      saveCart(); updateCartUI();
    }

    function changeQty(id, delta) {
      const item = cart.find((i) => String(i.id) === String(id));
      if (!item) return;
      const newQty = item.qty + delta;
      if (newQty <= 0) { removeFromCart(id); return; }
      const rawId = item.productId != null ? item.productId : item.id;
      const stockId = !isNaN(Number(rawId)) ? Number(rawId) : Number(String(rawId).split("_")[0]);
      const available = getStock(stockId);
      if (available > 0 && newQty > available) {
        showToast(I18N.getLang() === 'en' ? `Only ${available} in stock!` : `الكمية المتوفرة ${available} فقط!`);
        return;
      }
      item.qty = newQty;
      saveCart();
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById("cartCount").textContent = cart.length;
      const itemsEl = document.getElementById("cartItems");
      if (cart.length === 0) {
        itemsEl.innerHTML = `<div class="empty-cart">${I18N.t("cart.empty")}</div>`;
      } else {
        itemsEl.innerHTML = cart.map((item) => {
          const fullName = I18N.getLang() === 'en' ? (item.nameEn || item.name) : item.name;
          const parts = fullName.split(' — ');
          const nameHtml = parts.length > 1
            ? `${parts[0]}<br/><span style="color:var(--muted);font-size:.78rem;">${parts[1]}</span>`
            : fullName;
          return `
          <div class="cart-item">
            <div class="cart-item-emoji">${item.image ? `<img src="${item.image}" alt="" style="width:2.4rem;height:2.4rem;object-fit:cover;border-radius:6px;" />` : item.emoji}</div>
            <div class="cart-item-info">
              <div class="cart-item-name" style="font-size:.85rem;line-height:1.4;">${nameHtml}</div>
              <div class="cart-item-price">₪${(Number(item.price) * Number(item.qty)).toFixed(2)}</div>
            </div>
            <div class="cart-item-qty">
              <button class="qty-btn" data-id="${item.id}" data-delta="-1">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" data-id="${item.id}" data-delta="1">+</button>
              <button class="remove-item-btn" data-id="${item.id}">🗑</button>
            </div>
          </div>`;
        }).join("");
        itemsEl.querySelectorAll(".qty-btn").forEach((btn) => {
          btn.addEventListener("click", () => changeQty(btn.dataset.id, Number(btn.dataset.delta)));
        });
        itemsEl.querySelectorAll(".remove-item-btn").forEach((btn) => {
          btn.addEventListener("click", () => removeFromCart(btn.dataset.id));
        });
      }
      const subtotal = cart.reduce((sum, i) => sum + Number(i.price) * Number(i.qty), 0);
      document.getElementById("cartSubtotal").textContent = `₪${subtotal.toFixed(2)}`;
      document.getElementById("cartTotal").textContent = `₪${subtotal.toFixed(2)}`;
    }

    function openCart() {
      document.getElementById("cartSidebar").classList.add("open");
      document.getElementById("cartOverlay").classList.add("open");
    }
    function closeCart() {
      document.getElementById("cartSidebar").classList.remove("open");
      document.getElementById("cartOverlay").classList.remove("open");
    }

    document.getElementById("cartBtn").addEventListener("click", openCart);
    document.getElementById("closeCart").addEventListener("click", closeCart);
    document.getElementById("cartOverlay").addEventListener("click", closeCart);

    // ── TOAST ─────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // ── ORDER MODAL ───────────────────────────────────────
    const WHATSAPP_NUMBER = "972522838766";

    function populateCitySelect() {
      const sel = document.getElementById("customerCity");
      const lang = I18N.getLang();
      sel.innerHTML = `<option value="">${I18N.t("order.cityPH")}</option>`;
      CITIES_FROM_NAZARETH.forEach((c) => {
        const opt = document.createElement("option");
        opt.value = c.km;
        opt.textContent = lang === "en" ? c.en : c.ar;
        sel.appendChild(opt);
      });
    }

    function updateOrderTotal() {
      const isPickup = document.getElementById("methodPickup").checked;
      const subtotal = cart.reduce((s, i) => s + Number(i.price) * Number(i.qty), 0);
      const citySelect = document.getElementById("customerCity");
      const citySelected = !isPickup && citySelect.value !== "";
      const cityKm = citySelected ? Number(citySelect.value) : null;
      const shipping = isPickup ? 0 : (citySelected ? getShippingFee(cityKm) : 0);
      document.getElementById("orderTotalDisplay").textContent = `₪${(subtotal + shipping).toFixed(2)}`;
      const estimateEl = document.getElementById("shippingEstimate");
      if (isPickup) {
        estimateEl.textContent = `🏪 ${I18N.getLang() === 'en' ? 'Pickup: Free' : 'الاستلام: مجاني'}`;
        estimateEl.style.display = "block";
      } else if (citySelected) {
        estimateEl.textContent = `🚚 ${I18N.t("order.shippingFee").replace("{fee}", shipping)}`;
        estimateEl.style.display = "block";
      } else {
        estimateEl.textContent = `📍 ${I18N.getLang() === 'en' ? 'Select a city to calculate shipping' : 'اختر مدينة لحساب الشحن'}`;
        estimateEl.style.display = "block";
      }
    }

    function setDeliveryMode(isPickup) {
      document.getElementById("cityField").style.display   = isPickup ? "none" : "flex";
      document.getElementById("streetField").style.display = isPickup ? "none" : "flex";
      document.getElementById("pickupInfo").style.display  = isPickup ? "block" : "none";
      document.getElementById("customerCity").required    = !isPickup;
      document.getElementById("customerAddress").required = !isPickup;
      updateOrderTotal();
    }

    function openOrderModal() {
      populateCitySelect();
      document.getElementById("methodDelivery").checked = true;
      setDeliveryMode(false);
      document.getElementById("orderOverlay").classList.add("open");
      document.getElementById("orderModal").classList.add("open");
    }

    function closeOrderModal() {
      document.getElementById("orderOverlay").classList.remove("open");
      document.getElementById("orderModal").classList.remove("open");
      document.getElementById("orderForm").reset();
    }

    document.getElementById("closeOrder").addEventListener("click", closeOrderModal);
    document.getElementById("orderOverlay").addEventListener("click", closeOrderModal);
    document.getElementById("methodDelivery").addEventListener("change", () => setDeliveryMode(false));
    document.getElementById("methodPickup").addEventListener("change",   () => setDeliveryMode(true));
    document.getElementById("customerCity").addEventListener("change", updateOrderTotal);

    document.getElementById("orderForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name     = document.getElementById("customerName").value.trim();
      const phone    = document.getElementById("customerPhone").value.trim();
      const notes    = document.getElementById("customerNotes").value.trim();
      const isPickup = document.getElementById("methodPickup").checked;
      const subtotal = cart.reduce((s, i) => s + Number(i.price) * Number(i.qty), 0);
      let shippingFee = 0, locationLine = "";
      if (isPickup) {
        locationLine = `📍 الاستلام: من المتجر في الناصرة`;
      } else {
        const citySel  = document.getElementById("customerCity");
        const cityKm   = citySel.value !== "" ? Number(citySel.value) : 0;
        const cityName = citySel.selectedOptions[0]?.text || "";
        const address  = document.getElementById("customerAddress").value.trim();
        shippingFee    = citySel.value !== "" ? getShippingFee(cityKm) : 0;
        locationLine   = `📍 المدينة: ${cityName}\n🏠 العنوان: ${address}`;
      }
      const total = subtotal + shippingFee;
      const itemsList = cart.map((i) => `• ${i.name} x${Number(i.qty)} — ₪${(Number(i.price) * Number(i.qty)).toFixed(2)}`).join("\n");
      const message =
        `طلب جديد من متجر عبق 🛍️\n──────────────────\n` +
        `👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n${locationLine}\n` +
        (notes ? `📝 ملاحظات: ${notes}\n` : "") +
        `──────────────────\n${itemsList}\n──────────────────\n` +
        `🛒 المجموع الجزئي: ₪${subtotal.toFixed(2)}\n` +
        (isPickup ? `🏪 الاستلام: مجاني\n` : `🚚 الشحن: ₪${shippingFee.toFixed(2)}\n`) +
        `💰 الإجمالي: ₪${total.toFixed(2)}\nالدفع عند الاستلام`;
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
      for (const item of cart) {
        const rawId = item.productId != null ? item.productId : item.id;
      const stockId = !isNaN(Number(rawId)) ? Number(rawId) : Number(String(rawId).split("_")[0]);
        await deductStock(stockId, item.qty);
      }
      cart = []; saveCart(); updateCartUI(); closeOrderModal(); closeCart();
      showToast(I18N.t("toast.orderSent"));
    });

    document.getElementById("checkoutBtn").addEventListener("click", () => {
      if (cart.length === 0) { showToast(I18N.t("toast.emptyCart")); return; }
      const lang = I18N.getLang();
      const stockId = (i) => {
        if (i.productId != null) return Number(i.productId);
        const n = Number(i.id);
        if (!isNaN(n)) return n;
        return Number(String(i.id).split("_")[0]); // handle "3_box" style ids
      };
      const outOfStock = cart.filter((i) => getStock(stockId(i)) === 0);
      const overStock  = cart.filter((i) => getStock(stockId(i)) > 0 && i.qty > getStock(stockId(i)));
      if (outOfStock.length > 0 || overStock.length > 0) {
        let msg = lang === 'en'
          ? "Some items in your cart are no longer available:\n\n"
          : "بعض المنتجات في سلتك لم تعد متوفرة:\n\n";
        outOfStock.forEach((i) => {
          msg += lang === 'en'
            ? `• ${i.nameEn || i.name} — Out of stock\n`
            : `• ${i.name} — نفد المخزون\n`;
        });
        overStock.forEach((i) => {
          msg += lang === 'en'
            ? `• ${i.nameEn || i.name} — Only ${getStock(stockId(i))} available\n`
            : `• ${i.name} — المتوفر فقط ${getStock(stockId(i))}\n`;
        });
        msg += lang === 'en'
          ? "\nPlease update your cart before placing the order."
          : "\nيرجى تحديث السلة قبل إتمام الطلب.";
        alert(msg);
        return;
      }
      openOrderModal();
    });

    // ── RENDER PRODUCT PAGE ───────────────────────────────
    function renderPage() {
      const params = new URLSearchParams(window.location.search);
      const id = Number(params.get("id"));
      const product = products.find((p) => p.id === id);
      const content = document.getElementById("pageContent");
      const lang = I18N.getLang();

      if (!product) {
        content.innerHTML = `<div class="not-found"><h2>${I18N.t("product.notFound")}</h2><a href="index.html" class="btn-primary" style="margin-top:16px;display:inline-block;">${I18N.t("product.backToShop")}</a></div>`;
      } else {
        const displayName = lang === 'en' ? (product.nameEn || product.name) : product.name;
        const displayDesc = lang === 'en' ? (product.descEn || product.desc) : product.desc;
        document.title = `${displayName} — عبق`;
        const thumbs = product.images.map((src, i) => `
          <div class="gallery-thumb ${i === 0 ? 'active' : ''}" data-src="${src}">
            <img src="${src}" alt="${displayName}" style="filter:${product.imgFilter || 'none'}" />
          </div>`).join("");

        const inStock = getStock(product.id) > 0;
        const hasVariants = product.variants && product.variants.length > 0;
        const defaultPrice = hasVariants ? product.variants[1].price : product.price;

        const variantsHTML = hasVariants ? `
          <div class="variant-toggle">
            ${product.variants.map((v, i) => `
              <label class="variant-option ${i === 1 ? 'selected' : ''}">
                <input type="radio" name="variant" value="${i}" ${i === 1 ? 'checked' : ''} />
                <span class="variant-label">${lang === 'en' ? v.labelEn : v.label}</span>
                <span class="variant-price">₪${v.price}</span>
              </label>`).join("")}
          </div>` : '';

        const contentsArr = lang === 'en' ? product.contentsEn : product.contents;
        const contentsHTML = contentsArr && contentsArr.length ? `
          <div class="package-contents">
            <div class="contents-title">🎁 ${lang === 'en' ? 'Full Package Contents:' : 'محتويات الباقة الكاملة:'}</div>
            <ul class="contents-list">
              <li>✔ ${lang === 'en' ? 'The box with motivational cards' : 'الصندوق مع بطاقات تحفيزية'}</li>
              ${contentsArr.map((c) => `<li>✔ ${c}</li>`).join("")}
            </ul>
            <div style="margin-top:10px;font-size:.85rem;color:var(--muted);">
              ${lang === 'en' ? '📦 Box only: includes the box + motivational cards.' : '📦 الصندوق فقط: يتضمن الصندوق + البطاقات التحفيزية.'}
            </div>
          </div>` : '';

        content.innerHTML = `
          <div class="product-page">
            <div class="product-gallery">
              <div class="gallery-main">
                <img id="mainImg" src="${product.images[0]}" alt="${displayName}"
                  style="object-position:${product.imgPosition || 'center'};filter:${product.imgFilter || 'none'};" />
              </div>
              ${product.images.length > 1 ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}
            </div>
            <div class="product-detail">
              <a href="index.html" class="back-link">← ${I18N.t("product.backToShop")}</a>
              <h1>${displayName}</h1>
              <div class="product-price" id="detailPrice">₪${defaultPrice.toFixed(2)}</div>
              <div class="product-desc">${displayDesc}</div>
              ${variantsHTML}
              ${contentsHTML}
              ${inStock ? `
              <div class="product-qty-row">
                <button class="qty-btn" id="detailMinus">−</button>
                <span class="qty-val" id="detailQty">1</span>
                <button class="qty-btn" id="detailPlus">+</button>
              </div>
              <button class="add-to-cart" id="detailAddCart">${I18N.t("product.addToCart")}</button>`
              : `<button class="add-to-cart" disabled style="opacity:.4;cursor:not-allowed;">${I18N.t("product.outOfStock")}</button>`}
            </div>
          </div>`;

        // Thumbnail switching
        document.querySelectorAll(".gallery-thumb").forEach((thumb) => {
          thumb.addEventListener("click", () => {
            document.getElementById("mainImg").src = thumb.dataset.src;
            document.querySelectorAll(".gallery-thumb").forEach((t) => t.classList.remove("active"));
            thumb.classList.add("active");
          });
        });

        // Variant selection
        let selectedVariantIndex = hasVariants ? 1 : null;
        document.querySelectorAll("input[name='variant']").forEach((radio) => {
          radio.addEventListener("change", () => {
            selectedVariantIndex = Number(radio.value);
            const v = product.variants[selectedVariantIndex];
            document.getElementById("detailPrice").textContent = `₪${v.price.toFixed(2)}`;
            document.querySelectorAll(".variant-option").forEach((el) => el.classList.remove("selected"));
            radio.closest(".variant-option").classList.add("selected");
          });
        });

        // Qty controls
        document.getElementById("detailMinus")?.addEventListener("click", () => {
          const el = document.getElementById("detailQty");
          if (Number(el.textContent) > 1) el.textContent = Number(el.textContent) - 1;
        });
        document.getElementById("detailPlus")?.addEventListener("click", () => {
          const el = document.getElementById("detailQty");
          const stock = getStock(product.id);
          if (Number(el.textContent) < stock) el.textContent = Number(el.textContent) + 1;
          else showToast(I18N.getLang() === 'en' ? `Only ${stock} in stock!` : `الكمية المتوفرة ${stock} فقط!`);
        });

        document.getElementById("detailAddCart")?.addEventListener("click", () => {
          const qty = Number(document.getElementById("detailQty").textContent);
          if (hasVariants && selectedVariantIndex !== null) {
            const v = product.variants[selectedVariantIndex];
            const cartId = `${product.id}_${v.key}`;
            const variantProduct = {
              ...product,
              id: cartId,
              productId: product.id,
              name: `${product.name} — ${v.label}`,
              nameEn: `${product.nameEn} — ${v.labelEn}`,
              price: v.price,
              variantKey: v.key,
            };
            const existing = cart.find((i) => i.id === cartId);
            const currentInCart = existing ? existing.qty : 0;
            const available = getStock(product.id);
            const allVariantsInCart = cart.filter((i) => i.productId === product.id).reduce((s, i) => s + i.qty, 0);
            if (allVariantsInCart + qty > available) {
              showToast(lang === 'en' ? `Only ${available} in stock!` : `الكمية المتوفرة ${available} فقط!`);
              return;
            }
            if (existing) { existing.qty += qty; } else { cart.push({ ...variantProduct, qty }); }
            saveCart();
            updateCartUI();
            showToast(I18N.t("toast.added", { name: lang === 'en' ? variantProduct.nameEn : variantProduct.name }));
            openCart();
          } else {
            addToCart(product.id, qty);
            openCart();
          }
        });
      }
    }

    (async () => {
      await loadStock();
      I18N.init();
      renderPage();
      updateCartUI();
    })();

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        await loadStock();
        renderPage();
      }
    });
  </script>
</body>
</html>
