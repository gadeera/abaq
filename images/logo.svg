<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d97e"/>
      <stop offset="50%" stop-color="#e4a911"/>
      <stop offset="100%" stop-color="#c8830a"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9e89a"/>
      <stop offset="100%" stop-color="#d4920e"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Outer decorative ring dots -->
  <g fill="url(#goldGrad)" opacity="0.6">
    <circle cx="100" cy="10" r="2.2"/>
    <circle cx="100" cy="190" r="2.2"/>
    <circle cx="10" cy="100" r="2.2"/>
    <circle cx="190" cy="100" r="2.2"/>
    <circle cx="29" cy="29" r="1.8"/>
    <circle cx="171" cy="29" r="1.8"/>
    <circle cx="29" cy="171" r="1.8"/>
    <circle cx="171" cy="171" r="1.8"/>
  </g>

  <!-- Central ornamental flower -->
  <!-- 8 petals -->
  <g transform="translate(100,72)" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.9">
    <ellipse rx="5" ry="14" transform="rotate(0)"/>
    <ellipse rx="5" ry="14" transform="rotate(45)"/>
    <ellipse rx="5" ry="14" transform="rotate(90)"/>
    <ellipse rx="5" ry="14" transform="rotate(135)"/>
  </g>
  <!-- Inner petal fill -->
  <g transform="translate(100,72)" fill="url(#goldGrad)" opacity="0.25">
    <ellipse rx="4" ry="12" transform="rotate(0)"/>
    <ellipse rx="4" ry="12" transform="rotate(45)"/>
    <ellipse rx="4" ry="12" transform="rotate(90)"/>
    <ellipse rx="4" ry="12" transform="rotate(135)"/>
  </g>
  <!-- Center dot -->
  <circle cx="100" cy="72" r="4.5" fill="url(#goldGrad)"/>
  <circle cx="100" cy="72" r="2" fill="#1a1a2e"/>

  <!-- Decorative horizontal lines -->
  <line x1="38" y1="93" x2="72" y2="93" stroke="url(#goldGrad)" stroke-width="1" opacity="0.7"/>
  <line x1="128" y1="93" x2="162" y2="93" stroke="url(#goldGrad)" stroke-width="1" opacity="0.7"/>
  <circle cx="37" cy="93" r="2" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="163" cy="93" r="2" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Arabic text عبق -->
  <text
    x="100"
    y="133"
    text-anchor="middle"
    font-family="'Amiri', 'Scheherazade New', 'Arial', serif"
    font-size="46"
    font-weight="bold"
    fill="url(#goldGrad2)"
    letter-spacing="2"
  >عبق</text>

  <!-- Tagline -->
  <text
    x="100"
    y="158"
    text-anchor="middle"
    font-family="'Amiri', 'Arial', serif"
    font-size="11"
    fill="url(#goldGrad)"
    opacity="0.8"
    letter-spacing="3"
  >ABAQ</text>

  <!-- Bottom ornament -->
  <g transform="translate(100,172)" fill="url(#goldGrad)" opacity="0.6">
    <polygon points="0,-5 1.5,-1.5 5,0 1.5,1.5 0,5 -1.5,1.5 -5,0 -1.5,-1.5" />
  </g>
  <line x1="60" y1="172" x2="86" y2="172" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>
  <line x1="114" y1="172" x2="140" y2="172" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>
</svg>
